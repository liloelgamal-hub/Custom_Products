<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنهاء الطلب - Custom Products</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .form-card, .summary-card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.5rem; background: var(--bg-primary); color: var(--text-primary); }
        @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <h1 class="section-title" data-aos="fade-up">إنهاء الطلب</h1>
            <div class="checkout-grid">
                <div class="form-card" data-aos="fade-right">
                    <form id="checkout-form">
                        <div class="form-group">
                            <label>الاسم الكامل</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label>العنوان</label>
                            <textarea id="address" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>رقم الهاتف</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width:100%;">إتمام الطلب</button>
                    </form>
                </div>
                <div class="summary-card" data-aos="fade-left">
                    <h3>ملخص الطلب</h3>
                    <div id="order-summary"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><span>© 2025 Custom Products. جميع الحقوق محفوظة.</span></div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/public/js/translations.js"></script>
    <script src="/public/js/main.js"></script>
    <script>
        AOS.init({ once: true, offset: 100 });

        function renderOrderSummary() {
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const summaryDiv = document.getElementById('order-summary');
            if (cart.length === 0) {
                summaryDiv.innerHTML = '<p>السلة فارغة، لا يمكن إتمام الطلب.</p>';
                return;
            }
            summaryDiv.innerHTML = `
                <ul style="list-style: none; padding:0;">
                    ${cart.map(item => `<li>${item.name} × ${item.quantity} = $${(item.price * item.quantity).toFixed(2)}</li>`).join('')}
                </ul>
                <hr style="margin: 1rem 0;">
                <strong>الإجمالي: $${total.toFixed(2)}</strong>
            `;
        }

        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const cart = getCart();
            if (cart.length === 0) {
                alert('السلة فارغة!');
                return;
            }

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);

            const orderData = {
                id: Date.now(),
                customer: { name, email, address, phone },
                items: cart,
                total,
                date: new Date().toISOString()
            };

            // حفظ الطلب في localStorage (محاكاة)
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(orderData);
            localStorage.setItem('orders', JSON.stringify(orders));

            // مسح السلة
            localStorage.removeItem('cart');
            updateCartCount();

            alert('تم إنشاء الطلب بنجاح! شكراً لك.');
            window.location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderOrderSummary();
            updateCartCount();
        });
    </script>
</body>
</html>
